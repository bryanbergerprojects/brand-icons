name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  stable:
    name: Release Stable
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build icons (generated package sources)
        run: pnpm build:icons

      - name: Build packages
        run: pnpm build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Exit pre mode if active
        run: |
          if [[ -f .changeset/pre.json ]]; then
            pnpm changeset pre exit
            git add .changeset
            git commit -m "chore(release): exit pre mode"
            git push origin main
          fi

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm run version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create aggregate GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          version=$(echo "$PUBLISHED" | jq -r '.[0].version')
          tag="v$version"
          notes=$(echo "$PUBLISHED" | jq -r '.[] | "- `\(.name)@\(.version)`"')
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "v$version" \
            --notes "Published packages:

          $notes"

  canary:
    name: Release Canary
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/canary'
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build icons (generated package sources)
        run: pnpm build:icons

      - name: Build packages
        run: pnpm build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version canary packages
        run: pnpm run version

      - name: Commit version bumps
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "chore(release): canary packages"
            git push origin canary
          else
            echo "No version changes to commit"
          fi

      - name: Publish to npm (canary tag)
        id: publish
        run: |
          pnpm release
          version=$(node -p "require('./packages/core/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Create aggregate GitHub Release for canary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.publish.outputs.version }}
        run: |
          tag="v$VERSION"
          notes=$(git tag --points-at HEAD | sed 's/^/- `/;s/$/`/')
          git tag -a "$tag" -m "Release $tag"
          git push --follow-tags
          gh release create "$tag" \
            --title "v$VERSION" \
            --notes "Published canary packages:

          $notes" \
            --prerelease
