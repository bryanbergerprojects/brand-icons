<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!--
    Slack 2013 hashtag logo — mono variant.
    Exact same geometry as color.svg; fills replaced with currentColor.
    The 4 bar rects form the body (opacity 1); the 4 intersection rects
    use fill-opacity 0.35 to convey the overlap accent visible in color.
    Center of the # remains transparent (no element covers it).
  -->
  <g transform="rotate(15 12 12)">
    <!-- Vertical bar left -->
    <rect x="7.2" y="1.5" width="4.6" height="21" rx="2.3" fill="currentColor"/>
    <!-- Vertical bar right -->
    <rect x="12.2" y="1.5" width="4.6" height="21" rx="2.3" fill="currentColor"/>
    <!-- Horizontal bar top -->
    <rect x="1.5" y="7.2" width="21" height="4.6" rx="2.3" fill="currentColor"/>
    <!-- Horizontal bar bottom -->
    <rect x="1.5" y="12.2" width="21" height="4.6" rx="2.3" fill="currentColor"/>
    <!-- Intersection accents: darker in color → subtle overlay to convey depth -->
    <rect x="7.2" y="7.2" width="4.6" height="4.6" fill="currentColor" fill-opacity="0.35"/>
    <rect x="12.2" y="7.2" width="4.6" height="4.6" fill="currentColor" fill-opacity="0.35"/>
    <rect x="7.2" y="12.2" width="4.6" height="4.6" fill="currentColor" fill-opacity="0.35"/>
    <rect x="12.2" y="12.2" width="4.6" height="4.6" fill="currentColor" fill-opacity="0.35"/>
  </g>
</svg>
